<!-- Invoicing shell: sticky sub-nav + router-outlet for the sub-pages. -->
<div class="invoicing-shell">
  <!-- Page header -->
  <header class="invoicing-shell__header">
    <div class="invoicing-shell__title-row">
      <div>
        <h1 class="invoicing-shell__title">{{ 'invoicing.title' | translate }}</h1>
        <p class="invoicing-shell__subtitle">{{ 'invoicing.subtitle' | translate }}</p>
      </div>
    </div>

    <!-- Desktop sticky sub-nav -->
    <nav class="invoicing-subnav" aria-label="Invoicing sections">
      <div class="invoicing-subnav__pills">
        @for (tab of tabs; track tab.id) {
          <a
            class="nav-button invoicing-subnav__pill"
            [class.nav-button-active]="isActive(tab)"
            [class.nav-button-inactive]="!isActive(tab)"
            [routerLink]="tab.route">
            <span>{{ tab.labelKey | translate }}</span>
          </a>
        }
      </div>

      <!-- "+ New" dropdown (desktop) -->
      <div class="invoicing-subnav__new" (click)="$event.stopPropagation()">
        <button type="button"
                class="btn-primary invoicing-subnav__new-btn"
                (click)="toggleNewDropdown()"
                [attr.aria-expanded]="newDropdownOpen()">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
          </svg>
          <span>{{ 'invoicing.create.menu.button' | translate }}</span>
        </button>
        @if (newDropdownOpen()) {
          <ul class="invoicing-subnav__menu" role="menu">
            @for (opt of createOptions; track opt.route) {
              <li role="none">
                <button type="button"
                        role="menuitem"
                        class="invoicing-subnav__menu-item"
                        (click)="goToCreateOption(opt)">
                  <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="opt.iconPath" />
                  </svg>
                  <span>{{ opt.labelKey | translate }}</span>
                </button>
              </li>
            }
          </ul>
        }
      </div>
    </nav>

    <!-- Mobile select-based nav -->
    <div class="invoicing-subnav__mobile">
      <select class="form-select invoicing-subnav__mobile-select"
              [value]="selectedMobileRoute()"
              (change)="onMobileNavChange($event)"
              [attr.aria-label]="'invoicing.subnav.ariaLabel' | translate">
        @for (tab of tabs; track tab.id) {
          <option [value]="tab.route">{{ tab.labelKey | translate }}</option>
        }
      </select>
    </div>
  </header>

  <!-- Outlet for sub-pages -->
  <main class="invoicing-shell__content">
    <router-outlet></router-outlet>
  </main>

  <!-- Mobile floating "+" FAB -->
  <button type="button"
          class="invoicing-shell__fab"
          (click)="onMobileFab()"
          [attr.aria-label]="'invoicing.create.menu.newInvoice' | translate">
    <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4" />
    </svg>
  </button>
</div>
