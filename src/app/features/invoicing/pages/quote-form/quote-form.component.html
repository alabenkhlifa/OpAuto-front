<div class="quote-form-page">
  <form class="glass-card" [formGroup]="form" (ngSubmit)="onSubmit()">
    <h2 class="quote-form-page__title">{{ 'invoicing.quotes.form.title' | translate }}</h2>

    <div class="quote-form-page__grid">
      <label class="quote-form-page__field">
        <span>{{ 'invoicing.quotes.form.customer' | translate }} *</span>
        <select class="form-select"
                formControlName="customerId"
                (change)="onCustomerChange($event)">
          <option value="">{{ 'invoicing.create.selectCustomer' | translate }}</option>
          @for (c of customers(); track c.id) {
            <option [value]="c.id">{{ c.name }}</option>
          }
        </select>
      </label>

      <label class="quote-form-page__field">
        <span>{{ 'invoicing.quotes.form.vehicle' | translate }} *</span>
        <select class="form-select" formControlName="carId">
          <option value="">{{ 'invoicing.create.selectVehicle' | translate }}</option>
          @for (car of cars(); track car.id) {
            <option [value]="car.id">{{ car.make }} {{ car.model }} — {{ car.licensePlate }}</option>
          }
        </select>
      </label>

      <label class="quote-form-page__field">
        <span>{{ 'invoicing.quotes.form.validUntil' | translate }} *</span>
        <input type="date" class="form-input" formControlName="validUntil" />
      </label>

      <label class="quote-form-page__field quote-form-page__field--full">
        <span>{{ 'invoicing.quotes.form.description' | translate }} *</span>
        <input type="text" class="form-input"
               formControlName="description"
               [placeholder]="'invoicing.create.itemDescription' | translate" />
      </label>

      <label class="quote-form-page__field">
        <span>{{ 'invoicing.quotes.form.quantity' | translate }} *</span>
        <input type="number" min="1" class="form-input" formControlName="quantity" />
      </label>

      <label class="quote-form-page__field">
        <span>{{ 'invoicing.quotes.form.unitPrice' | translate }} (TND) *</span>
        <input type="number" min="0" step="0.01" class="form-input" formControlName="unitPrice" />
      </label>

      <label class="quote-form-page__field quote-form-page__field--full">
        <span>{{ 'invoicing.quotes.form.notes' | translate }}</span>
        <textarea rows="3" class="form-input"
                  formControlName="notes"
                  [placeholder]="'invoicing.create.notesPlaceholder' | translate"></textarea>
      </label>
    </div>

    <div class="quote-form-page__actions">
      <button type="button" class="btn-secondary" (click)="cancel()">
        {{ 'common.cancel' | translate }}
      </button>
      <button type="submit"
              class="btn-primary"
              [disabled]="form.invalid || isSubmitting()">
        {{ (isSubmitting() ? 'common.saving' : 'invoicing.quotes.form.submit') | translate }}
      </button>
    </div>
  </form>
</div>
