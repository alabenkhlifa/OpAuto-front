<aside
  class="assistant-panel"
  [class.is-open]="isOpen()"
  [attr.aria-hidden]="!isOpen()"
  role="dialog"
  aria-modal="false"
  [attr.aria-label]="'assistant.title' | translate"
>
  <header class="assistant-panel__header">
    <div class="assistant-panel__title-block">
      <span class="assistant-panel__title">{{ 'assistant.title' | translate }}</span>
      @if (isStreaming()) {
        <span class="assistant-panel__streaming" aria-live="polite">
          {{ 'assistant.streaming' | translate }}
        </span>
      }
    </div>

    <div class="assistant-panel__actions">
      <button
        type="button"
        class="btn-tertiary btn-icon btn-sm"
        [attr.aria-label]="'assistant.newConversation' | translate"
        (click)="startNewConversation()"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M21 12a9 9 0 1 1-3.5-7.1"></path>
          <polyline points="21 4 21 10 15 10"></polyline>
        </svg>
      </button>

      <button
        type="button"
        class="btn-tertiary btn-icon btn-sm"
        [attr.aria-label]="'assistant.closeButton' | translate"
        (click)="close()"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
  </header>

  @if (errorMessage(); as err) {
    <div class="assistant-panel__error" role="alert">{{ err }}</div>
  }

  <section class="assistant-panel__body">
    <div class="assistant-panel__conversations" data-slot="conversations">
      <ng-content select="[data-slot='conversations']"></ng-content>
    </div>

    <div class="assistant-panel__messages" data-slot="messages">
      <ng-content select="[data-slot='messages']"></ng-content>
    </div>

    <div class="assistant-panel__approval" data-slot="approval">
      <ng-content select="[data-slot='approval']"></ng-content>
    </div>
  </section>

  <footer class="assistant-panel__footer" data-slot="input">
    <ng-content select="[data-slot='input']"></ng-content>
  </footer>
</aside>
