<aside
  class="assistant-panel"
  [class.is-open]="isOpen()"
  [attr.aria-hidden]="!isOpen()"
  role="dialog"
  aria-modal="false"
  [attr.aria-label]="'assistant.title' | translate"
>
  <header class="assistant-panel__header">
    <div class="assistant-panel__title-block">
      <span class="assistant-panel__title-icon" aria-hidden="true">✨</span>
      <span class="assistant-panel__title">
        @if (isStreaming()) {
          {{ 'assistant.header.thinking' | translate }}
        } @else {
          {{ 'assistant.header.title' | translate }}
        }
      </span>
    </div>

    <div class="assistant-panel__actions">
      <button
        type="button"
        class="btn-tertiary btn-icon btn-sm"
        [attr.aria-label]="'assistant.header.history' | translate"
        (click)="historyClicked.emit()"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
      </button>

      <button
        type="button"
        class="btn-tertiary btn-icon btn-sm"
        [attr.aria-label]="'assistant.header.newConversation' | translate"
        (click)="startNewConversation()"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
        </svg>
      </button>

      <button
        type="button"
        class="btn-tertiary btn-icon btn-sm"
        [attr.aria-label]="'assistant.header.close' | translate"
        (click)="close()"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
  </header>

  @if (errorMessage(); as err) {
    <div class="assistant-panel__error" role="alert">{{ err }}</div>
  }

  <section class="assistant-panel__body">
    <div class="assistant-panel__messages" data-slot="messages">
      <ng-content select="[data-slot='messages']"></ng-content>
    </div>

    <div class="assistant-panel__approval" data-slot="approval">
      <ng-content select="[data-slot='approval']"></ng-content>
    </div>
  </section>

  <footer class="assistant-panel__footer" data-slot="input">
    <ng-content select="[data-slot='input']"></ng-content>
  </footer>

  <div class="assistant-panel__drawer" data-slot="drawer">
    <ng-content select="[data-slot='drawer']"></ng-content>
  </div>
</aside>
