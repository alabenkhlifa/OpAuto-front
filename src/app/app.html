<div class="app-container" [class.sidebar-collapsed]="sidebarService.isCollapsed()" [class.hide-sidebar]="isAuthRoute()">
  <!-- Sidebar Navigation -->
  @if (!isAuthRoute()) {
    <app-sidebar></app-sidebar>
  }
  
  <!-- Main Content Area -->
  <main class="main-content" [class.no-sidebar]="isAuthRoute()">
    <!-- Top Bar with Notification Bell -->
    @if (!isAuthRoute()) {
      <div class="top-bar">
        <div class="top-bar-spacer"></div>
        <app-notification-bell></app-notification-bell>
      </div>
    }
    <!-- Page Content -->
    <router-outlet />
  </main>
</div>

<!-- Global Toast Notifications -->
<app-toast></app-toast>
