<div class="app-container" [class.sidebar-collapsed]="sidebarService.isCollapsed()" [class.hide-sidebar]="isShelllessRoute()">
  <!-- Sidebar Navigation -->
  @if (!isShelllessRoute()) {
    <app-sidebar></app-sidebar>
  }
  
  <!-- Main Content Area -->
  <main class="main-content" [class.no-sidebar]="isShelllessRoute()">
    <!-- Top Bar with Notification, Language, User Profile -->
    @if (!isShelllessRoute()) {
      <div class="top-bar">
        <div class="top-bar-spacer"></div>
        <div class="top-bar-actions">
          <app-notification-bell></app-notification-bell>
          <app-language-toggle></app-language-toggle>
          <app-user-profile-pill></app-user-profile-pill>
        </div>
      </div>
    }
    <!-- Page Content -->
    <router-outlet />
  </main>
</div>

<!-- Global Toast Notifications -->
<app-toast></app-toast>

<!-- AI Assistant — floating launcher + slide-in panel (every authenticated route) -->
@if (!isShelllessRoute()) {
  <app-assistant-launcher></app-assistant-launcher>
}
