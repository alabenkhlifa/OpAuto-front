version: '3.8'
services:
  db:
    image: postgres:16-alpine
    container_name: opauto-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-opauto}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-opauto_secret}
      POSTGRES_DB: ${DB_NAME:-opauto}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-opauto}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./opauto-backend
      dockerfile: Dockerfile
    container_name: opauto-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-opauto}:${DB_PASSWORD:-opauto_secret}@db:5432/${DB_NAME:-opauto}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      # All supported LLM providers — the first key found is used (see
      # opauto-backend/src/ai/ai.service.ts). Leave blank to fall back to
      # the deterministic mock responses.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      # OVHcloud AI Endpoints. OVH_BASE_URL and OVH_MODEL fall back to
      # kepler.ai endpoint + Meta-Llama-3.3-70B in code when unset.
      OVH_API_KEY: ${OVH_API_KEY:-}
      OVH_BASE_URL: ${OVH_BASE_URL:-}
      OVH_MODEL: ${OVH_MODEL:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      NODE_ENV: production
      PORT: 3000
      # Churn AI executable-actions SMS delivery. Default 'mock' logs to the
      # Nest logger; set SMS_PROVIDER=twilio and fill the Twilio creds in
      # /opt/opauto/.env to send real SMS via Twilio.
      SMS_PROVIDER: ${SMS_PROVIDER:-mock}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      # Email delivery. Default 'mock' logs to the Nest logger; set
      # EMAIL_PROVIDER=resend and fill RESEND_* in /opt/opauto/.env to
      # send real email via Resend.
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-mock}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-}
    volumes:
      # Persist user-uploaded photos across container restarts. The backend
      # writes to /app/uploads (resolved via __dirname + '../../uploads' in
      # the compiled dist; see maintenance.service.ts:uploadRoot()).
      - uploads:/app/uploads
    healthcheck:
      # -f fails on 4xx; NestJS has no handler at /api bare (Nest default 404).
      # A reachable TCP response is enough to call the process alive. We hit
      # /api/auth/login with GET → the server replies (Nest auto-404), proving
      # the app is up; we just don't treat the 404 itself as a failure.
      test: ["CMD-SHELL", "curl -sS -o /dev/null -m 3 http://localhost:3000/api/auth/login || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: opauto-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dist/OpAuto-front/browser:/usr/share/nginx/html:ro

volumes:
  pg_data:
  uploads:
